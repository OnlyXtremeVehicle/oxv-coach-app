name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund
        env:
          # On exporte des valeurs factices pour que le typecheck passe
          # sans nécessiter les secrets Supabase à l'install.
          EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Jest tests
        run: npm test -- --ci --reporters=default --coverage=false
        env:
          # Tests RLS — skippés silencieusement si secrets absents.
          # Pour activer : définir ces 3 secrets dans Settings > Secrets.
          # Voir docs/TESTS_RLS_SETUP.md
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_SUPABASE_SERVICE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_KEY }}

      - name: Scan doctrinal (verbes interdits)
        run: npx tsx scripts/check-doctrine.ts

      - name: Scan accessibilité (Pressables sans accessibilityRole)
        run: npx tsx scripts/check-accessibility.ts --strict
