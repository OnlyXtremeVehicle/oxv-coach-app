<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════════
  OXV MIRROR — FICHE CIRCUIT · gaming v3
  Grammaire cockpit. Spécifique : tracé hero qui se dessine, virage
  signature en heritage (or vieilli, réservé), méta, vos chiffres,
  prochaines sessions, réserver.
  Couvre : circuit/[id].
  ════════════════════════════════════════════════════════════════════
-->
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>OXV Mirror — Fiche circuit gaming</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap');
  :root{--cream:#F8F9FA;--mute:#9A9AA3;--faint:#54545C;--line:#1C1C20;
    --red:#C8102E;--gold:#FFB703;--heritage:#C4A459;--green:#4ADE80;
    --sans:'Geist',system-ui,sans-serif;--mono:'Geist Mono',monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:var(--cream);font-family:var(--sans);display:flex;flex-direction:column;align-items:center;gap:24px;padding:40px 16px 64px;min-height:100vh}
  .device{width:392px;max-width:100%;position:relative;overflow:hidden;border-radius:36px;
    background:radial-gradient(72% 38% at 50% 24%,rgba(196,164,89,.09) 0%,transparent 60%),
      radial-gradient(120% 70% at 50% 0%,#0E0E14 0%,#040406 62%),
      repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0 1px,transparent 1px 26px),
      repeating-linear-gradient(90deg,rgba(255,255,255,.018) 0 1px,transparent 1px 26px);
    border:1px solid #161619;box-shadow:0 36px 90px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04)}
  .device::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:3;background:radial-gradient(105% 80% at 50% 40%,transparent 56%,rgba(0,0,0,.6) 100%)}
  .screen{position:relative;z-index:2;padding:20px 20px 26px}
  .status{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;opacity:0;animation:fadeDown .6s ease .05s forwards}
  .status .lz{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.26em;color:var(--heritage)}
  .status .lz i{width:6px;height:6px;border-radius:50%;background:var(--heritage);box-shadow:0 0 10px rgba(196,164,89,.8);animation:blink 2.4s ease-in-out infinite}
  .status .rz{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--mute)}

  .hero svg{width:100%;height:222px;display:block}
  .ctrace{fill:none;stroke:var(--cream);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 0 5px rgba(248,249,250,.25));stroke-dasharray:920;stroke-dashoffset:920;animation:draw 1.7s ease .3s forwards}
  .sig{fill:none;stroke:var(--heritage);stroke-width:4.4;stroke-linecap:round;
    filter:drop-shadow(0 0 7px rgba(196,164,89,.85));opacity:0;animation:fade .6s ease 1.9s forwards}

  .title{margin:2px 2px 4px;opacity:0;animation:fadeUp .6s ease .5s forwards}
  .title h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .title .sub{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--heritage);margin-top:4px}

  .meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:14px 0;opacity:0;animation:fadeUp .5s ease .65s forwards}
  .meta .m{border:1px solid var(--line);border-radius:11px;padding:11px 8px;text-align:center;background:rgba(255,255,255,.014)}
  .meta .m .v{font-family:var(--mono);font-size:16px;font-weight:600;color:#fff}
  .meta .m .l{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:5px}

  .yours{display:flex;gap:9px;margin-bottom:14px;opacity:0;animation:fadeUp .5s ease .8s forwards}
  .yc{flex:1;border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:rgba(255,255,255,.014)}
  .yc .l{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .yc .v{font-family:var(--mono);font-size:19px;font-weight:600;margin-top:7px;color:var(--gold);text-shadow:0 0 14px rgba(255,183,3,.35)}
  .yc.alt .v{color:#fff;text-shadow:none}

  .sess{margin-bottom:14px;opacity:0;animation:fadeUp .5s ease .95s forwards}
  .sess .sh{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
  .sl{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;background:rgba(255,255,255,.012)}
  .sl .d{font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--cream)}
  .sl .t{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
  .sl .t.hi{color:var(--green)}

  .book{display:flex;align-items:center;justify-content:center;gap:9px;padding:16px;border-radius:14px;
    background:linear-gradient(135deg,#FFB703,#FF9500);color:#1a1206;font-weight:700;font-size:14px;letter-spacing:.01em;
    box-shadow:0 0 24px rgba(255,183,3,.35);opacity:0;animation:fadeUp .5s ease 1.1s forwards;cursor:pointer}

  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fade{to{opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
</style></head>
<body>
  <div class="device"><div class="screen">

    <div class="status">
      <span class="lz"><i></i>CIRCUIT</span>
      <span class="rz">17 · LA GÉNÉTOUZE</span>
    </div>

    <div class="hero">
      <svg viewBox="0 0 320 240">
        <path id="ctrace" class="ctrace" d="M 70,185 C 44,150 44,92 92,72 C 132,56 158,82 198,74 C 248,64 246,36 282,46 C 316,56 314,112 280,124 C 254,133 252,162 212,168 C 162,175 152,202 112,202 C 90,202 80,198 70,185 Z"/>
        <path id="sig" class="sig"/>
      </svg>
    </div>

    <div class="title">
      <h1>Haute-Saintonge</h1>
      <div class="sub">Tracé Jean-Pierre Beltoise</div>
    </div>

    <div class="meta">
      <div class="m"><div class="v">3,6 km</div><div class="l">Longueur</div></div>
      <div class="m"><div class="v">12</div><div class="l">Virages</div></div>
      <div class="m"><div class="v">Horaire</div><div class="l">Sens</div></div>
    </div>

    <div class="yours">
      <div class="yc"><div class="l">Votre meilleur tour</div><div class="v">1:32.4</div></div>
      <div class="yc alt"><div class="l">Vos roulages ici</div><div class="v">42</div></div>
    </div>

    <div class="sess">
      <div class="sh">Prochaines sessions</div>
      <div class="sl"><span class="d">MAR · 24.06</span><span class="t hi">Places ouvertes</span></div>
      <div class="sl"><span class="d">SAM · 28.06</span><span class="t hi">Places ouvertes</span></div>
      <div class="sl"><span class="d">MAR · 01.07</span><span class="t">Complet</span></div>
    </div>

    <div class="book">◉ Réserver une session</div>

  </div></div>

  <script>
    (function(){
      var p=document.getElementById('ctrace'), len=p.getTotalLength();
      var a=0.30,b=0.41,N=20,d='';
      for(var i=0;i<=N;i++){var t=a+(b-a)*(i/N);var pt=p.getPointAtLength(t*len);d+=(i?'L':'M')+pt.x.toFixed(1)+','+pt.y.toFixed(1);}
      document.getElementById('sig').setAttribute('d',d);
    })();
  </script>
</body></html>
