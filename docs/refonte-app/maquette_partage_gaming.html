<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════════
  OXV MIRROR — PARTAGE (carte trophée) · gaming v3
  Le seul écran destiné à sortir de l'app. Carte 4:5 partageable :
  logotype, chiffre trophée (meilleur tour), tracé gold qui se dessine,
  signature oxvehicle.fr. Glow soigné, objet de fierté.
  IMPORTANT charte : or quotidien #FFB703 — JAMAIS heritage #C4A459
  (réservé au tier Heritage).
  Couvre : partage, share/[token], social-carte.
  ════════════════════════════════════════════════════════════════════
-->
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>OXV Mirror — Partage gaming</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap');
  :root{--cream:#F8F9FA;--mute:#9A9AA3;--faint:#54545C;--line:#1C1C20;
    --red:#C8102E;--gold:#FFB703;--heritage:#C4A459;--green:#4ADE80;
    --sans:'Geist',system-ui,sans-serif;--mono:'Geist Mono',monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:var(--cream);font-family:var(--sans);display:flex;flex-direction:column;align-items:center;gap:24px;padding:40px 16px 64px;min-height:100vh}
  .device{width:392px;max-width:100%;position:relative;overflow:hidden;border-radius:36px;
    background:radial-gradient(120% 70% at 50% 0%,#0E0E14 0%,#040406 62%),
      repeating-linear-gradient(0deg,rgba(255,255,255,.016) 0 1px,transparent 1px 26px),
      repeating-linear-gradient(90deg,rgba(255,255,255,.016) 0 1px,transparent 1px 26px);
    border:1px solid #161619;box-shadow:0 36px 90px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04)}
  .device::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:3;background:radial-gradient(105% 80% at 50% 42%,transparent 58%,rgba(0,0,0,.55) 100%)}
  .screen{position:relative;z-index:2;padding:20px 20px 26px}
  .status{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;opacity:0;animation:fadeDown .6s ease .05s forwards}
  .status .lz{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.24em;color:var(--gold);text-shadow:0 0 16px rgba(255,183,3,.5)}
  .status .lz i{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px rgba(255,183,3,.9);animation:blink 2.4s ease-in-out infinite}
  .status .rz{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--mute)}

  /* Carte trophée 4:5 */
  .card{position:relative;aspect-ratio:4/5;border-radius:20px;overflow:hidden;margin-bottom:18px;
    border:1px solid rgba(255,183,3,.22);
    background:radial-gradient(90% 60% at 50% 42%,rgba(255,183,3,.13) 0%,transparent 60%),
      linear-gradient(165deg,#0E0D0B 0%,#070707 70%);
    box-shadow:0 24px 60px rgba(0,0,0,.6),inset 0 0 60px rgba(255,183,3,.04);
    opacity:0;animation:cardIn .8s cubic-bezier(.2,.8,.25,1) .2s forwards}
  .card .pad{position:absolute;inset:0;display:flex;flex-direction:column;padding:24px 24px 22px}
  .card .top{display:flex;align-items:center;justify-content:space-between}
  .logo{font-weight:700;font-size:22px;letter-spacing:.16em;color:var(--cream)}
  .logo b{color:var(--gold);text-shadow:0 0 16px rgba(255,183,3,.5)}
  .card .meta{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);text-align:right;line-height:1.5}

  .card .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .card .trace{width:160px;height:108px;margin-bottom:6px}
  .card .trace path.t{fill:none;stroke:var(--gold);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 0 6px rgba(255,183,3,.8));stroke-dasharray:560;stroke-dashoffset:560;animation:draw 1.6s ease .7s forwards}
  .card .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);opacity:0;animation:fade .5s ease 1.1s forwards}
  .card .big{font-family:var(--mono);font-size:60px;font-weight:700;line-height:.9;color:#fff;letter-spacing:.01em;
    text-shadow:0 0 36px rgba(255,183,3,.5),0 0 10px rgba(255,183,3,.4);opacity:0;transform:scale(.9);animation:popIn .7s cubic-bezier(.2,.9,.25,1.05) 1s forwards}

  .card .bot{display:flex;align-items:center;justify-content:space-between}
  .card .sig{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--cream)}
  .card .badge{width:22px;height:22px;border-radius:6px;border:1px solid rgba(255,183,3,.4);display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:11px;color:var(--gold);text-shadow:0 0 8px rgba(255,183,3,.5)}

  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;opacity:0;animation:fadeUp .6s ease 1.3s forwards}
  .act{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 8px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.014);cursor:pointer}
  .act .ai{font-size:17px;color:var(--gold)}
  .act .al{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute)}
  .act.primary{border-color:rgba(255,183,3,.4);background:linear-gradient(135deg,rgba(255,183,3,.1),rgba(255,255,255,.012))}

  @keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fade{to{opacity:1}}
  @keyframes popIn{to{opacity:1;transform:scale(1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
</style></head>
<body>
  <div class="device"><div class="screen">

    <div class="status">
      <span class="lz"><i></i>PARTAGE</span>
      <span class="rz">CARTE TROPHÉE</span>
    </div>

    <div class="card">
      <div class="pad">
        <div class="top">
          <div class="logo">O<b>X</b>V</div>
          <div class="meta">Haute-Saintonge<br>14.06.2026</div>
        </div>
        <div class="center">
          <svg class="trace" viewBox="0 0 320 240">
            <path class="t" d="M 70,185 C 44,150 44,92 92,72 C 132,56 158,82 198,74 C 248,64 246,36 282,46 C 316,56 314,112 280,124 C 254,133 252,162 212,168 C 162,175 152,202 112,202 C 90,202 80,198 70,185 Z"/>
          </svg>
          <div class="lbl">Meilleur tour</div>
          <div class="big">1:32.4</div>
        </div>
        <div class="bot">
          <div class="sig">oxvehicle.fr</div>
          <div class="badge">▲</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <div class="act primary"><span class="ai">◇</span><span class="al">Story</span></div>
      <div class="act"><span class="ai">⤓</span><span class="al">Enregistrer</span></div>
      <div class="act"><span class="ai">⛓</span><span class="al">Lien</span></div>
    </div>

  </div></div>
</body></html>
