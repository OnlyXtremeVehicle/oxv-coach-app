<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
</head>
<body style="margin:0;padding:40px 20px;background:#050505;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <table cellpadding="0" cellspacing="0" border="0" role="presentation" align="center" width="100%" style="max-width:560px;margin:0 auto;">
    <tr>
      <td style="background:#0A0A0A;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:44px 40px;">
        <p style="margin:0 0 10px 0;color:#C8102E;font-size:11px;letter-spacing:3px;font-weight:600;text-transform:uppercase;">OXV &middot; CHANGEMENT D'ADRESSE</p>
        <div style="width:36px;height:2px;background:#C8102E;margin:0 0 26px 0;line-height:2px;font-size:0;">&nbsp;</div>
        <h1 style="margin:0 0 24px 0;color:#ffffff;font-size:28px;font-weight:200;line-height:1.3;">Bonjour.</h1>
        <p style="margin:0 0 16px 0;color:#cccccc;font-size:16px;line-height:1.6;">Confirmez votre nouvelle adresse e-mail pour la lier à votre compte OXV.</p>
        <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin:8px 0 4px 0;">
          <tr><td style="background:#C8102E;border-radius:8px;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:15px;font-weight:600;letter-spacing:0.3px;text-decoration:none;">Confirmer ma nouvelle adresse</a>
          </td></tr>
        </table>
        <p style="margin:30px 0 0 0;padding-top:22px;border-top:1px solid rgba(255,255,255,0.08);color:#777777;font-size:12px;line-height:1.6;">Vous n'êtes pas à l'origine de cette demande&nbsp;? Écrivez à <a href="mailto:contact@oxvehicle.fr" style="color:#999999;">contact@oxvehicle.fr</a>.</p>
        <p style="margin:8px 0 0 0;color:#555555;font-size:11px;letter-spacing:1px;">— L'équipe OXV</p>
      </td>
    </tr>
  </table>
</body>
</html>
